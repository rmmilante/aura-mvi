services:
  simulator:
    build: ./simulator
    ports:
      - "8001:8001"
    environment:
      - PORT=8001

  edge-agent:
    build: ./edge-agent
    ports:
      - "8002:8002"
    environment:
      - SIMULATOR_URL=http://simulator:8001
      - SIGNAL_API_URL=http://signal-api:8003
    depends_on:
      - simulator
      - signal-api

  signal-api:
    build: ./signal-api
    ports:
      - "8003:8003"
    environment:
      - PORT=8003

  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
    depends_on:
      - edge-agent
      - signal-api